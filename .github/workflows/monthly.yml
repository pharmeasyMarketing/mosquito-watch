name: Monthly - Layer 3 season retrospective

# Rebuilds the Layer 3 season retrospective (re-parses the IDSP weekly reports across the
# season window from config/idsp.json) once a month. The build's own data-quality guard
# aborts on an unexpected parse, so a format change never publishes garbage. The step is
# allowed to fail so a bad source week never blocks the deploy of the other layers.

on:
  schedule:
    - cron: "30 3 1 * *"      # 1st of month, 09:00 IST (03:30 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies (pdfplumber for Layer 3 PDF parsing)
        run: pip install -r requirements.txt

      - name: Build Layer 3 season retrospective (IDSP)
        continue-on-error: true
        run: python src/build_layer3_season.py

      - name: Pre-render site
        run: python src/build_site.py
        env:
          SITE_ENV: staging

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ index.html sitemap.xml robots.txt site.webmanifest
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): monthly Layer 3 season refresh [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          fi

      - name: Assemble _site
        run: |
          mkdir -p _site
          cp index.html robots.txt sitemap.xml site.webmanifest _site/
          cp -r data assets _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
