name: Deploy to GitHub Pages

# Builds the static site (pre-render) and deploys it to GitHub Pages.
# Runs on human pushes to main and on manual dispatch. The scheduled data
# workflows (daily/weekly/monthly) deploy themselves, because pushes made with
# the default GITHUB_TOKEN do not trigger this push event (GitHub anti-recursion).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Pre-render site (meta, JSON-LD, content, robots, sitemap)
        run: python src/build_site.py
        env:
          SITE_ENV: staging
      - name: Assemble _site
        run: |
          mkdir -p _site
          cp index.html robots.txt sitemap.xml site.webmanifest _site/
          cp -r data assets _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
